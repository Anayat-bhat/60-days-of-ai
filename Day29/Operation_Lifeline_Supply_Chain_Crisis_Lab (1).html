<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Operation Lifeline: Supply Chain Crisis Lab</title>
<style>
  :root{
    --bg: #0A0E17;
    --panel: #121A2B;
    --panel-2: #182238;
    --border: #26314A;
    --border-soft: #1D2740;
    --text: #E8ECF4;
    --muted: #8B93A7;
    --muted-2: #5F6880;
    --gold: #E3A857;
    --gold-soft: rgba(227,168,87,0.14);
    --teal: #37C9B4;
    --red: #E5584B;
    --red-soft: rgba(229,88,75,0.14);
    --radius: 16px;
    --font-display: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(91,141,239,0.10), transparent 60%),
      radial-gradient(1000px 500px at 110% 10%, rgba(227,168,87,0.08), transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  ::selection { background: var(--gold-soft); }
  a { color: inherit; }
  .app-shell{ max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding: 10px 4px 26px; border-bottom: 1px solid var(--border-soft); margin-bottom: 30px; flex-wrap:wrap; gap:12px; }
  .topbar .brand{ display:flex; align-items:center; gap:10px; font-family: var(--font-display); letter-spacing: 0.3px; font-size: 18px; }
  .brand .dot{ width:9px; height:9px; border-radius:50%; background: var(--gold); box-shadow: 0 0 12px 2px rgba(227,168,87,0.55); }
  .stage-ticker{ font-family: var(--font-mono); font-size: 11.5px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display:flex; gap: 14px; flex-wrap: wrap; }
  .stage-ticker span{ position:relative; padding-left:14px; }
  .stage-ticker span::before{ content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:6px; height:6px; border-radius:50%; background: var(--border); }
  .stage-ticker span.done::before{ background: var(--teal); }
  .stage-ticker span.active{ color: var(--gold); }
  .stage-ticker span.active::before{ background: var(--gold); box-shadow: 0 0 8px 1px rgba(227,168,87,0.7); }
  h1,h2,h3,h4 { font-family: var(--font-display); font-weight: 400; margin: 0; }
  .card{ background: linear-gradient(180deg, var(--panel), var(--panel-2)); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 24px; transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease; }
  .card:hover{ border-color: #34405e; box-shadow: 0 10px 30px -12px rgba(0,0,0,0.5); }
  .grid{ display:grid; gap: 16px; }
  .grid-2{ grid-template-columns: repeat(2, 1fr); }
  .grid-3{ grid-template-columns: repeat(3, 1fr); }
  @media (max-width: 900px){ .grid-2, .grid-3{ grid-template-columns: 1fr 1fr; } }
  @media (max-width: 620px){ .grid-2, .grid-3{ grid-template-columns: 1fr; } }
  .eyebrow{ font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 2px; font-size: 11.5px; color: var(--gold); margin-bottom: 10px; display:inline-block; }
  .lede{ color: var(--muted); font-size: 15.5px; line-height: 1.65; max-width: 720px; }
  .btn{ font-family: var(--font-body); font-size: 14.5px; font-weight: 600; letter-spacing: 0.2px; border-radius: 10px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); padding: 13px 22px; cursor: pointer; transition: all 0.2s ease; }
  .btn:hover{ border-color: var(--gold); color: var(--gold); transform: translateY(-1px); }
  .btn:active{ transform: translateY(0px) scale(0.99); }
  .btn.primary{ background: linear-gradient(135deg, #E3A857, #C9862F); border: none; color: #1a1204; }
  .btn.primary:hover{ filter: brightness(1.08); color:#1a1204; box-shadow: 0 8px 22px -8px rgba(227,168,87,0.6); }
  .btn:disabled{ opacity: 0.4; cursor: not-allowed; transform:none; box-shadow:none; }
  .btn.ghost{ background: transparent; }
  .btn-row{ display:flex; gap:12px; flex-wrap:wrap; margin-top: 22px; }
  .metric-row{ display:flex; flex-direction:column; gap:16px; }
  .metric .metric-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 7px; font-size: 13.5px; }
  .metric .metric-label{ color: var(--muted); letter-spacing: 0.3px; }
  .metric .metric-value{ font-family: var(--font-mono); font-size: 13.5px; color: var(--text); }
  .bar-track{ height: 9px; border-radius: 6px; background: #0D1424; border: 1px solid var(--border-soft); overflow:hidden; }
  .bar-fill{ height: 100%; width:0%; border-radius: 6px; transition: width 1.1s cubic-bezier(.16,.8,.28,1); background: linear-gradient(90deg, #5B8DEF, #37C9B4); }
  .bar-fill.warn{ background: linear-gradient(90deg, #E3A857, #E5584B); }
  .bar-fill.good{ background: linear-gradient(90deg, #37C9B4, #5FE3C6); }
  .bar-fill.bad{ background: linear-gradient(90deg, #E5584B, #B23A30); }
  .pill{ display:inline-block; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
  .pill.urgent{ color: var(--red); border-color: rgba(229,88,75,0.4); background: var(--red-soft); }
  .pill.gold{ color: var(--gold); border-color: rgba(227,168,87,0.4); background: var(--gold-soft); }
  .pill.teal{ color: var(--teal); border-color: rgba(55,201,180,0.4); background: rgba(55,201,180,0.14); }
  .option-card{ background: var(--panel-2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; cursor: pointer; transition: all 0.18s ease; display:flex; flex-direction:column; gap: 8px; }
  .option-card:hover{ border-color: var(--gold); transform: translateY(-2px); }
  .option-card.selected{ border-color: var(--teal); background: linear-gradient(180deg, rgba(55,201,180,0.10), var(--panel-2)); box-shadow: 0 0 0 1px rgba(55,201,180,0.35) inset; }
  .option-card.selected .sel-tag{ font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; color: var(--teal); }
  .option-card.disabled{ opacity:0.45; cursor:not-allowed; }
  .option-card .opt-title{ font-weight: 600; font-size: 15px; }
  .option-card .opt-desc{ color: var(--muted); font-size: 13.5px; line-height: 1.5; }
  .option-card .opt-tags{ display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; }
  .tag{ font-family: var(--font-mono); font-size: 10.5px; padding: 3px 7px; border-radius: 6px; background: #0D1424; color: var(--muted); border: 1px solid var(--border-soft); }
  .section-title{ font-size: 26px; margin-bottom: 6px; }
  .section-sub{ color: var(--muted); font-size: 14.5px; margin-bottom: 22px; line-height: 1.6; max-width: 700px;}
  .why-box{ border-left: 3px solid var(--gold); background: var(--gold-soft); padding: 12px 16px; border-radius: 0 10px 10px 0; font-size: 13.5px; color: #F0DDB4; line-height: 1.6; margin: 16px 0 22px; }
  .why-box b{ color: var(--gold); }
  .divider{ height:1px; background: var(--border-soft); margin: 26px 0; }
  .counter-pill{ font-family: var(--font-mono); font-size: 12.5px; color: var(--muted); }
  .counter-pill b{ color: var(--gold); }
  .gauge-wrap{ display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; }
  .gauge-score{ font-family: var(--font-display); font-size: 62px; color: var(--text); }
  .gauge-label{ font-family: var(--font-mono); text-transform:uppercase; letter-spacing:2px; font-size:12px; color: var(--muted); }
  .fade-in{ animation: fadeIn 0.5s ease both; }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .company-field{ display:flex; justify-content:space-between; padding: 9px 0; border-bottom: 1px solid var(--border-soft); font-size: 14px;}
  .company-field:last-child{ border-bottom:none; }
  .company-field .k{ color: var(--muted); }
  .company-field .v{ font-family: var(--font-mono); color: var(--text); }
  .hero{ text-align:center; padding: 60px 20px 40px; }
  .hero h1{ font-size: 46px; line-height:1.15; margin-bottom: 14px; }
  .hero .accent{ color: var(--gold); }
  .hero p{ color: var(--muted); font-size: 16.5px; max-width: 560px; margin: 0 auto 32px; line-height:1.65; }
  .feature-row{ display:flex; justify-content:center; gap: 14px; flex-wrap:wrap; margin: 40px 0 10px; }
  .feature-chip{ border: 1px solid var(--border); background: var(--panel); border-radius: 10px; padding: 10px 16px; font-size: 13px; color: var(--muted); font-family: var(--font-mono); }
  .feedback-block{ padding: 16px 18px; border-radius: 12px; border: 1px solid var(--border); background: var(--panel-2); margin-bottom: 14px; }
  .feedback-block h4{ font-size: 14px; color: var(--gold); margin-bottom: 8px; letter-spacing:0.3px; }
  .feedback-block p{ margin:0; font-size: 14px; color: var(--text); line-height: 1.6; }
  .final-grid{ display:grid; grid-template-columns: 1.1fr 1fr; gap: 20px; }
  @media (max-width: 900px){ .final-grid{ grid-template-columns: 1fr; } }
  .cat-score-row{ display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px; }
  .cat-score-row .cat-name{ font-size: 13.5px; color: var(--muted); }
  .cat-score-row .cat-num{ font-family: var(--font-mono); font-size: 14px; }
  .footer-note{ text-align:center; color: var(--muted-2); font-size: 12px; margin-top: 50px; font-family: var(--font-mono); }
  .round-tracker{ display:flex; gap:8px; margin-bottom: 18px; }
  .round-dot{ width: 30px; height:6px; border-radius:4px; background: var(--border); }
  .round-dot.done{ background: var(--teal); }
  .round-dot.current{ background: var(--gold); }
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ============================= DATA ============================= */

const INDUSTRIES = [
  "Consumer Electronics", "Automotive Components", "Pharmaceuticals",
  "Fashion Apparel", "Food & Beverage", "Industrial Machinery",
  "Semiconductors", "Home Appliances", "Medical Devices", "Furniture Manufacturing"
];

const NAME_PARTS_A = ["Northgate", "Vertex", "Solara", "Ridgeline", "Meridian", "Alderbrook", "Coastal", "Ironwood", "Halcyon", "Prairie", "Sterling", "Beacon"];
const NAME_PARTS_B = ["Industries", "Manufacturing Co.", "Global", "& Partners", "Group", "Holdings", "Dynamics", "Works", "Supply Co."];
const COUNTRIES_POOL = ["Vietnam", "Mexico", "Germany", "India", "Poland", "Malaysia", "Brazil", "South Korea", "Turkey", "Indonesia", "United States", "Bangladesh"];

function randInt(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr){ return arr[randInt(0, arr.length - 1)]; }
function pickN(arr, n){
  const copy = arr.slice();
  const out = [];
  for(let i=0;i<n && copy.length;i++){ out.push(copy.splice(randInt(0, copy.length-1),1)[0]); }
  return out;
}
function fmtMoney(n){ return n >= 1000 ? "$" + (n/1000).toFixed(1) + "B" : "$" + n + "M"; }
function clamp(n, min, max){ min = (min===undefined)?0:min; max=(max===undefined)?100:max; return Math.max(min, Math.min(max, n)); }
function esc(s){ const d=document.createElement('div'); d.textContent = s; return d.innerHTML; }

function generateCompany(){
  return {
    name: pick(NAME_PARTS_A) + " " + pick(NAME_PARTS_B),
    industry: pick(INDUSTRIES),
    revenue: randInt(80, 4200),
    factories: randInt(2, 12),
    warehouses: randInt(3, 22),
    suppliers: randInt(12, 85),
    inventoryDays: randInt(14, 60),
    leadTime: randInt(7, 48),
    countries: pickN(COUNTRIES_POOL, randInt(3, 6))
  };
}

const CRISES = [
  { id:"fire", title:"Factory Fire at Primary Production Site", urgency:"Critical", icon:"🔥",
    impact:"A fire has shut down your largest manufacturing plant. Production capacity drops sharply and safety inspections will delay reopening for weeks.",
    why:"Manufacturing outages test whether you have redundant capacity. Companies with single-source production sites face the steepest revenue hits during physical disruptions." },
  { id:"bankruptcy", title:"Key Supplier Files for Bankruptcy", urgency:"High", icon:"📉",
    impact:"One of your critical component suppliers has filed for bankruptcy protection, freezing shipments already in transit and threatening your production schedule.",
    why:"Supplier concentration risk is one of the most common causes of supply chain collapse — when too much volume sits with one vendor, their failure becomes your failure." },
  { id:"port_strike", title:"Port Workers' Strike at Major Export Hub", urgency:"High", icon:"🚢",
    impact:"Dockworkers at a major shipping port have walked out, stranding containers and creating a growing backlog that could last several weeks.",
    why:"Ocean freight still moves the vast majority of global goods by volume — a port strike can freeze an entire region's inbound and outbound logistics overnight." },
  { id:"cyberattack", title:"Ransomware Attack on Logistics Systems", urgency:"Critical", icon:"🖥️",
    impact:"A ransomware attack has locked your warehouse management and order-tracking systems. Teams are reverting to manual processes while IT contains the breach.",
    why:"Modern supply chains run on software. When visibility systems go dark, companies lose the ability to route, track, or even know where inventory physically sits." },
  { id:"flood", title:"Severe Flooding Near Regional Warehouse", urgency:"Severe", icon:"🌊",
    impact:"Flash flooding has damaged a regional distribution warehouse, destroying a portion of stored inventory and cutting off road access for deliveries.",
    why:"Climate-related disruptions are rising in frequency. Businesses that concentrate inventory in a single region are increasingly exposed to weather-driven losses." },
  { id:"shortage", title:"Global Shortage of a Key Raw Material", urgency:"High", icon:"⚠️",
    impact:"A critical raw material used across your product line is in short global supply, driving up input costs and threatening production schedules industry-wide.",
    why:"Raw material shortages ripple through every downstream manufacturer at once, turning single-supplier dependencies into board-level emergencies." },
  { id:"conflict", title:"Political Conflict Disrupts a Sourcing Region", urgency:"Critical", icon:"🌍",
    impact:"Escalating political conflict in a key sourcing region has closed borders and suspended exports, cutting off a portion of your supply base with no clear timeline.",
    why:"Geopolitical risk is often underestimated until it happens. Diversifying sourcing across regions is the primary defense against a single conflict freezing supply." },
  { id:"shipping_delay", title:"Extended Ocean Freight Delays", urgency:"Moderate", icon:"🕒",
    impact:"Congestion and vessel shortages have pushed average ocean freight transit times up significantly, threatening on-time delivery commitments to customers.",
    why:"Lead time volatility quietly erodes customer trust. Even without a dramatic event, chronic delays compound into lost sales and damaged relationships." }
];

const WAR_ROOM_ACTIONS = [
  { id:"air_freight", title:"Expedite Shipments via Air Freight", desc:"Switch affected shipments from ocean to air to restore delivery speed fast — at a significant cost premium.", tags:["Fast","Expensive"],
    effects:{ cost:22, inventory:8, profit:-12, deliverySpeed:26, satisfaction:14 },
    why:"Air freight can cost 4-6x more than ocean shipping, but it's the fastest lever to protect customer commitments during a crisis." },
  { id:"backup_supplier", title:"Activate a Backup Supplier", desc:"Shift orders to a pre-vetted secondary supplier in a different region to restore supply continuity.", tags:["Resilience","Risk Reduction"],
    effects:{ cost:10, inventory:20, profit:-6, deliverySpeed:10, satisfaction:6, risk:18 },
    why:"This is the textbook resilience move — supplier diversification. It costs more up front but sharply reduces single-point-of-failure risk." },
  { id:"draw_stock", title:"Draw Down Safety Stock Reserves", desc:"Release buffer inventory held in reserve to keep customer orders flowing while the crisis is contained.", tags:["Immediate","Depletes Buffer"],
    effects:{ cost:-4, inventory:-26, profit:6, deliverySpeed:16, satisfaction:11 },
    why:"Safety stock exists exactly for moments like this — but every unit drawn down leaves you more exposed if a second disruption hits." },
  { id:"delay_orders", title:"Delay Non-Priority Customer Orders", desc:"Deprioritize lower-tier accounts and bulk orders to protect fulfillment for your highest-value customers.", tags:["Cost-Saving","Risky"],
    effects:{ cost:-10, inventory:4, profit:9, deliverySpeed:-18, satisfaction:-16 },
    why:"This protects margin and top accounts short-term, but satisfaction damage among deprioritized customers can linger long after the crisis ends." },
  { id:"renegotiate_terms", title:"Renegotiate Payment Terms with Suppliers", desc:"Ask suppliers for extended payment windows to preserve cash flow during the disruption.", tags:["Cash Flow","Relationship Risk"],
    effects:{ cost:-14, inventory:-2, profit:11, deliverySpeed:-2, satisfaction:-4 },
    why:"Improves liquidity when you need it most, but leaning on suppliers during their own hard times can strain the relationship long-term." },
  { id:"comms_campaign", title:"Launch Proactive Customer Communication", desc:"Get ahead of the disruption with transparent updates, revised timelines, and goodwill gestures for affected customers.", tags:["Trust-Building","Low Cost"],
    effects:{ cost:6, inventory:0, profit:-3, deliverySpeed:0, satisfaction:22 },
    why:"Research consistently shows that proactive, honest communication during a crisis preserves customer trust even when delivery performance suffers." }
];

const NEGOTIATION_ROUNDS = [
  { round:1, prompt:"Your supplier opens by citing rising raw material costs and proposes a 15% price increase effective immediately.",
    options:[
      { id:"r1a", label:"Accept the increase to preserve the relationship", trust:14, price:15, leadTime:0, why:"Accepting quickly builds goodwill, but sets a precedent that you won't push back on future increases." },
      { id:"r1b", label:"Counter with data showing market rates are lower", trust:4, price:6, leadTime:2, why:"A data-backed counter often lands a middle-ground outcome without damaging trust too much." },
      { id:"r1c", label:"Firmly reject and threaten to shift volume elsewhere", trust:-12, price:0, leadTime:6, why:"Hardball tactics can hold the price line, but they raise the risk of a slower, colder relationship going forward." },
      { id:"r1d", label:"Propose a longer contract in exchange for a smaller increase", trust:10, price:7, leadTime:-2, why:"Trading commitment for price is a classic win-win lever — suppliers value predictable volume." }
    ] },
  { round:2, prompt:"The supplier asks for a decision on minimum order quantities to lock in production capacity for next quarter.",
    options:[
      { id:"r2a", label:"Commit to a high minimum order quantity", trust:12, price:-4, leadTime:-6, why:"Bigger commitments usually earn better pricing and priority production slots — but add inventory risk." },
      { id:"r2b", label:"Keep quantities flexible, month-to-month", trust:-6, price:3, leadTime:4, why:"Flexibility protects you from demand swings but can push you to the back of the supplier's priority queue." },
      { id:"r2c", label:"Split the order across this supplier and a backup", trust:-2, price:2, leadTime:1, why:"Diversifying volume slightly weakens this relationship's leverage but strengthens your overall resilience." },
      { id:"r2d", label:"Offer a moderate commitment tied to performance guarantees", trust:8, price:-2, leadTime:-3, why:"Performance-linked commitments align incentives on both sides — a mature, balanced negotiating move." }
    ] },
  { round:3, prompt:"Mid-negotiation, the supplier reveals they can guarantee faster lead times — for a premium.",
    options:[
      { id:"r3a", label:"Pay the premium for guaranteed faster lead times", trust:6, price:9, leadTime:-14, why:"Speed has a price. This is worth it when customer delivery promises are on the line." },
      { id:"r3b", label:"Decline — lead time isn't your bottleneck right now", trust:2, price:-2, leadTime:2, why:"Saying no to upsells you don't need protects margin and shows you negotiate with discipline." },
      { id:"r3c", label:"Ask for the faster lead time at no extra cost, citing loyalty", trust:-4, price:-6, leadTime:-6, why:"A bold ask can pay off with a loyal partner, but overreaching can sour the tone of the talks." },
      { id:"r3d", label:"Propose a trial period to test the faster service first", trust:5, price:2, leadTime:-8, why:"Trial periods de-risk the decision for both sides — a smart, low-commitment way to test new terms." }
    ] },
  { round:4, prompt:"Final round: the supplier asks you to sign a 12-month agreement today to close out the negotiation.",
    options:[
      { id:"r4a", label:"Sign the 12-month agreement as proposed", trust:10, price:0, leadTime:0, why:"Closing decisively builds trust and certainty, assuming the terms negotiated so far were favorable." },
      { id:"r4b", label:"Push for a 6-month trial agreement instead", trust:-3, price:3, leadTime:1, why:"Shorter terms protect you from being locked into a bad deal, at the cost of some pricing leverage." },
      { id:"r4c", label:"Request a written service-level agreement (SLA) before signing", trust:3, price:1, leadTime:-4, why:"SLAs formalize expectations and give you recourse if performance slips — a hallmark of mature procurement." },
      { id:"r4d", label:"Walk away and reopen bidding to competitors", trust:-18, price:-8, leadTime:10, why:"This can unlock a better deal elsewhere, but discarding months of negotiation carries real relationship and time cost." }
    ] }
];

const BOARDROOM_QUESTIONS = [
  { q:"Your COO wants to announce the crisis publicly before all facts are confirmed. How do you respond as CEO?",
    options:[
      { label:"Delay any statement until the full picture is verified", score:14, tag:"Cautious" },
      { label:"Issue a brief, honest holding statement now and follow up with details", score:20, tag:"Strong" },
      { label:"Let the COO make the announcement without review", score:5, tag:"Risky" },
      { label:"Say nothing publicly and manage it internally only", score:8, tag:"Weak" }
    ], why:"Crisis communication research consistently favors early, honest, incomplete disclosure over silence or premature certainty — it builds credibility even under uncertainty." },
  { q:"Finance flags that the crisis response could blow through this quarter's cost budget. What's your call?",
    options:[
      { label:"Cap spending immediately regardless of customer impact", score:6, tag:"Weak" },
      { label:"Approve a defined emergency budget with clear limits", score:20, tag:"Strong" },
      { label:"Approve unlimited spend until the crisis resolves", score:9, tag:"Risky" },
      { label:"Freeze all non-essential spend company-wide", score:12, tag:"Cautious" }
    ], why:"Bounded emergency budgets give teams room to act decisively without exposing the company to open-ended financial risk — a core crisis governance principle." },
  { q:"A key customer threatens to leave over delayed shipments. How do you personally engage?",
    options:[
      { label:"Call the customer directly and offer a concrete recovery plan", score:20, tag:"Strong" },
      { label:"Delegate entirely to the account manager", score:10, tag:"Cautious" },
      { label:"Offer a steep discount without addressing the root cause", score:8, tag:"Risky" },
      { label:"Wait to see if the customer follows through on leaving", score:4, tag:"Weak" }
    ], why:"Executive presence during a customer crisis signals that the relationship matters at the highest level — it's often more valuable than any discount." },
  { q:"Your leadership team is split on whether to disclose the crisis to investors this quarter. What do you decide?",
    options:[
      { label:"Disclose proactively with a clear mitigation plan attached", score:20, tag:"Strong" },
      { label:"Disclose only the minimum legally required", score:11, tag:"Cautious" },
      { label:"Delay disclosure until next quarter's results", score:5, tag:"Weak" },
      { label:"Disclose everything including unverified worst-case scenarios", score:7, tag:"Risky" }
    ], why:"Investors reward transparency paired with a credible plan far more than they punish bad news — surprises damage trust more than problems do." },
  { q:"After the immediate crisis is contained, what's your first move as CEO?",
    options:[
      { label:"Commission a full post-mortem and resilience investment plan", score:20, tag:"Strong" },
      { label:"Move on quickly to avoid dwelling on the disruption", score:6, tag:"Weak" },
      { label:"Publicly praise the team without deeper analysis", score:10, tag:"Cautious" },
      { label:"Restructure the supply chain team immediately without review", score:8, tag:"Risky" }
    ], why:"The highest-value moment in any crisis is the post-mortem — it's how one-time disruptions become permanent resilience upgrades instead of repeat events." }
];

const AI_INVESTMENTS = [
  { id:"forecasting", title:"Demand Forecasting AI", desc:"Machine learning models that predict customer demand using historical sales, seasonality, and market signals.",
    impact:"Reduces stockouts and overstock simultaneously by improving forecast accuracy — typically a 20-30% error reduction versus manual forecasting.",
    stats:{ resilience:12, cost:8, risk:6, satisfaction:8 } },
  { id:"inventory", title:"Inventory Optimization AI", desc:"Algorithms that continuously recalculate optimal stock levels and reorder points across every warehouse.",
    impact:"Frees up working capital tied in excess inventory while reducing the odds of stockouts on fast-moving items.",

const STAGES = ["Company","Crisis","War Room","Negotiation","Boardroom","AI Strategy","Dashboard"];

/* ============================= STATE ============================= */

const baseMetrics = { cost:45, inventory:55, profit:55, deliverySpeed:50, satisfaction:55, riskMgmt:40 };

let state = {
  stage: "welcome",
  company: null,
  crisis: null,
  war: { selected: [], confirmed: false, metrics: null },
  neg: { roundIndex:0, trust:50, price:50, leadTime:50, showWhyOpt:null, result:null },
  board: { qIndex:0, totalScore:0, picked:null, answers:[], result:null },
  ai: { selected: [], result:null },
  final: null
};

const root = document.getElementById("root");

/* ============================= HELPERS ============================= */

function toneFor(value){ return value >= 70 ? "good" : value <= 35 ? "bad" : "warn"; }

function barHtml(id, value, tone){
  tone = tone || toneFor(value);
  return '<div class="bar-track"><div class="bar-fill ' + tone + '" id="' + id + '" data-target="' + clamp(value) + '"></div></div>';
}

function metricHtml(idPrefix, label, value){
  const tone = toneFor(value);
  return (
    '<div class="metric">' +
      '<div class="metric-head"><span class="metric-label">' + esc(label) + '</span><span class="metric-value">' + Math.round(value) + '</span></div>' +
      barHtml(idPrefix + '-bar', value, tone) +
    '</div>'
  );
}

function animateBars(){
  document.querySelectorAll('.bar-fill[data-target]').forEach(el => {
    const target = el.getAttribute('data-target');
    requestAnimationFrame(() => {
      setTimeout(() => { el.style.width = target + '%'; }, 60);
    });
  });
}

function stageTickerHtml(activeIndex){
  return '<div class="stage-ticker">' + STAGES.map((s,i) => {
    const cls = i < activeIndex ? 'done' : (i === activeIndex ? 'active' : '');
    return '<span class="' + cls + '">' + esc(s) + '</span>';
  }).join('') + '</div>';
}

const stageIndexMap = { welcome:-1, company:0, crisis:1, warroom:2, negotiation:3, boardroom:4, ai:5, dashboard:6 };

/* ============================= RENDER ROUTER ============================= */

function render(){
  const idx = stageIndexMap[state.stage];
  let body = "";
  if(state.stage === "welcome") body = renderWelcome();
  else if(state.stage === "company") body = renderCompany();
  else if(state.stage === "crisis") body = renderCrisis();
  else if(state.stage === "warroom") body = renderWarRoom();
  else if(state.stage === "negotiation") body = renderNegotiation();
  else if(state.stage === "boardroom") body = renderBoardroom();
  else if(state.stage === "ai") body = renderAI();
  else if(state.stage === "dashboard") body = renderDashboard();

  root.innerHTML =
    '<div class="app-shell">' +
      '<div class="topbar">' +
        '<div class="brand"><span class="dot"></span> Operation Lifeline</div>' +
        (state.stage !== "welcome" ? stageTickerHtml(idx) : '') +
      '</div>' +
      body +
      (state.stage === "welcome" ? '<div class="footer-note">BUILT FOR SUPPLY CHAIN LEARNERS · NO DATA LEAVES YOUR BROWSER</div>' : '') +
    '</div>';

  animateBars();
}

function renderWarRoom(){
  const w = state.war;

function toggleWarAction(id){
  const w = state.war;
  if(w.confirmed) return;
  if(w.selected.includes(id)){
    w.selected = w.selected.filter(x => x !== id);
  } else if(w.selected.length < 3){
    w.selected = w.selected.concat([id]);
  }
  render();
}

function confirmWarRoom(){
  const w = state.war;
  if(w.selected.length !== 3) return;
  const chosen = WAR_ROOM_ACTIONS.filter(a => w.selected.includes(a.id));
  const next = Object.assign({}, baseMetrics);
  let riskGain = 0;
  chosen.forEach(a => {
    next.cost = clamp(next.cost + a.effects.cost);
    next.inventory = clamp(next.inventory + a.effects.inventory);
    next.profit = clamp(next.profit + a.effects.profit);
    next.deliverySpeed = clamp(next.deliverySpeed + a.effects.deliverySpeed);
    next.satisfaction = clamp(next.satisfaction + a.effects.satisfaction);
    riskGain += (a.effects.risk || 0);
  });
  next.riskMgmt = clamp(baseMetrics.riskMgmt + riskGain);
  w.metrics = next;
  w.confirmed = true;
  render();
}

function goNegotiation(){ state.stage = "negotiation"; render(); }

        '<div class="grid grid-2">' + optsHtml + '</div>' +
      '</div>' +
      whyHtml +
    '</div>'
  );
}

function chooseNegotiation(optId){
  const n = state.neg;
  const round = NEGOTIATION_ROUNDS[n.roundIndex];
  n.showWhyOpt = round.options.find(o => o.id === optId);
  render();
}

function reconsiderNegotiation(){
  state.neg.showWhyOpt = null;
  render();
}

function proceedNegotiation(){
  const n = state.neg;
  const opt = n.showWhyOpt;
  if(!opt) return;
  n.trust = clamp(n.trust + opt.trust);
  n.price = clamp(n.price + opt.price);
  n.leadTime = clamp(n.leadTime + opt.leadTime);
  n.showWhyOpt = null;
  const isLast = n.roundIndex === NEGOTIATION_ROUNDS.length - 1;
  if(isLast){
    const negotiationScore = clamp(Math.round((n.trust * 0.5) + ((100 - n.price) * 0.3) + ((100 - n.leadTime) * 0.2)));
    n.result = { trust: n.trust, price: n.price, leadTime: n.leadTime, negotiationScore: negotiationScore };
    goBoardroom();
  } else {
    n.roundIndex += 1;
    render();
  }
}

function goBoardroom(){ state.stage = "boardroom"; render(); }

function renderBoardroom(){
  const b = state.board;
  const question = BOARDROOM_QUESTIONS[b.qIndex];
  const isLast = b.qIndex === BOARDROOM_QUESTIONS.length - 1;

  const optsHtml = question.options.map((opt, i) => {
    const isChosen = b.picked === opt;
    return (
      '<div class="option-card' + (isChosen ? ' selected' : '') + '" onclick="chooseBoardroom(' + i + ')">' +
        '<div class="opt-title">' + esc(opt.label) + '</div>' +
      '</div>'
    );
  }).join('');

  let whyHtml = '';
  if(b.picked){
    whyHtml = (
      '<div class="fade-in" style="margin-top:18px;">' +
        '<div class="why-box"><b>Why this matters:</b> ' + esc(question.why) + '</div>' +
        '<div class="btn-row"><button class="btn primary" onclick="proceedBoardroom()">' + (isLast ? 'Finish Boardroom Session' : 'Next Question') + '</button></div>' +
      '</div>'
    );
  }

  return (
    '<div class="fade-in">' +
      '<div class="eyebrow">Step 5 of 6</div>' +
      '<h2 class="section-title">CEO Boardroom</h2>' +
      '<p class="section-sub">Five leadership moments. There\'s rarely one perfect answer — but some choices demonstrate stronger crisis leadership judgment than others.</p>' +
      '<div class="counter-pill" style="margin-bottom:14px;">Question <b>' + (b.qIndex + 1) + '</b> / ' + BOARDROOM_QUESTIONS.length + '</div>' +
      '<div class="card">' +
        '<p class="lede" style="margin-bottom:18px;color:var(--text);font-size:16.5px;">' + esc(question.q) + '</p>' +
        '<div class="grid grid-2">' + optsHtml + '</div>' +
      '</div>' +
      whyHtml +
    '</div>'
  );
}

function chooseBoardroom(i){
  const b = state.board;
  const question = BOARDROOM_QUESTIONS[b.qIndex];
  b.picked = question.options[i];
  render();
}

function proceedBoardroom(){
  const b = state.board;
  if(!b.picked) return;
  const question = BOARDROOM_QUESTIONS[b.qIndex];
  b.totalScore += b.picked.score;
  b.answers.push({ q: question.q, opt: b.picked });
  b.picked = null;
  const isLast = b.qIndex === BOARDROOM_QUESTIONS.length - 1;
  if(isLast){
    const leadershipScore = Math.round((b.totalScore / (BOARDROOM_QUESTIONS.length * 20)) * 100);
    b.result = { leadershipScore: leadershipScore, answers: b.answers };
    goAI();
  } else {
    b.qIndex += 1;
    render();
  }
}

function goAI(){ state.stage = "ai"; render(); }

function renderAI(){
  const a = state.ai;
  const cardsHtml = AI_INVESTMENTS.map(inv => {
    const isSel = a.selected.includes(inv.id);
    return (
      '<div class="option-card' + (isSel ? ' selected' : '') + '" onclick="toggleAI(\'' + inv.id + '\')">' +

function toggleAI(id){
  const a = state.ai;
  if(a.selected.includes(id)){
    a.selected = a.selected.filter(x => x !== id);
  } else if(a.selected.length < 2){
    a.selected = a.selected.concat([id]);

function confirmAI(){
  const a = state.ai;
  if(a.selected.length !== 2) return;
  a.result = { chosen: AI_INVESTMENTS.filter(inv => a.selected.includes(inv.id)) };
  state.stage = "dashboard";
  render();

function renderDashboard(){
  const company = state.company;
  const crisis = state.crisis;
  const warMetrics = state.war.metrics;
  const warSelected = state.war.selected;
  const negotiation = state.neg.result;
  const boardroom = state.board.result;
  const ai = state.ai.result;

  const costControl = clamp(100 - warMetrics.cost);
  const resilience = clamp(Math.round((warMetrics.inventory + warMetrics.deliverySpeed + (warMetrics.riskMgmt || 40)) / 3));
  const riskMgmt = clamp(Math.round(((warMetrics.riskMgmt || 40) + ai.chosen.reduce((s,a2) => s + a2.stats.risk, 0)) / 2));
  const customerSat = clamp(warMetrics.satisfaction);
  const leadership = boardroom.leadershipScore;
  const negotiationScore = negotiation.negotiationScore;

  const overall = Math.round(
    leadership * 0.2 +
    negotiationScore * 0.18 +
    resilience * 0.18 +
    costControl * 0.16 +
    riskMgmt * 0.14 +
    customerSat * 0.14
  );

  const chosenActions = WAR_ROOM_ACTIONS.filter(a2 => warSelected.includes(a2.id));
  const worstAction = chosenActions.slice().sort((a2,b2) => (a2.effects.satisfaction + a2.effects.deliverySpeed) - (b2.effects.satisfaction + b2.effects.deliverySpeed))[0];
  const bestAction = chosenActions.slice().sort((a2,b2) => (b2.effects.satisfaction + b2.effects.deliverySpeed + (b2.effects.risk||0)) - (a2.effects.satisfaction + a2.effects.deliverySpeed + (a2.effects.risk||0)))[0];

  const worstBoardAnswer = boardroom.answers.slice().sort((a2,b2) => a2.opt.score - b2.opt.score)[0];
  const bestBoardAnswer = boardroom.answers.slice().sort((a2,b2) => b2.opt.score - a2.opt.score)[0];

  let biggestMistake, bestDecision;
  if(worstBoardAnswer.opt.score <= 8 && (!worstAction || worstBoardAnswer.opt.score <= worstAction.effects.satisfaction)){
    biggestMistake = 'In the boardroom, choosing to "' + worstBoardAnswer.opt.label.toLowerCase() + '" reflected weaker crisis leadership judgment and likely cost you credibility with your team and stakeholders.';
  } else if(worstAction) {
    biggestMistake = 'Selecting "' + worstAction.title + '" in the War Room came at a real cost to delivery speed or customer satisfaction — a trade-off worth reconsidering next time.';
  } else {
    biggestMistake = 'Your weakest moment was in the negotiation, where an aggressive move cost you supplier trust that will be harder to rebuild than it was to lose.';
  }

  if(bestBoardAnswer.opt.score >= 18){
    bestDecision = 'Your best moment was in the boardroom: choosing to "' + bestBoardAnswer.opt.label.toLowerCase() + '" showed strong, decisive executive judgment under pressure.';
  } else if(bestAction) {
    bestDecision = 'Your strongest move was selecting "' + bestAction.title + '" in the War Room — it balanced resilience and customer impact well.';
  } else {
    bestDecision = 'Your strongest move was in the negotiation, where you protected trust and terms without overcommitting.';
  }

  let expertRec;
  if(resilience < 50){
    expertRec = "Your supply chain resilience score is a warning sign. Prioritize supplier diversification and safety stock policy before the next disruption — single points of failure are the most predictable cause of repeat crises.";
  } else if(costControl < 45){
    expertRec = "Cost control slipped during this crisis. Build a pre-approved emergency budget framework so future responses don't force a choice between speed and financial discipline.";
  } else if(riskMgmt < 50){
    expertRec = "Risk monitoring is your biggest gap. Real-time supplier risk visibility would have given you more warning and more options before this crisis escalated.";
  } else {
    expertRec = "You handled this crisis with solid fundamentals. The next step is turning reactive strength into proactive resilience — invest ahead of the next disruption, not just in response to it.";
  }

  const lessons = [
    "Diversifying suppliers and sourcing regions is the single highest-leverage defense against supply chain shocks.",
    "Proactive, honest communication protects customer trust even when delivery performance temporarily suffers.",
    "Safety stock is a finite resource — using it buys time, but it must be replenished before the next disruption.",
    "Negotiation trust compounds: early goodwill or early aggression both shape how later rounds play out.",
    "AI investments pay off most when aimed at early warning (risk monitoring) rather than only optimization."
  ];
  const pickedLessons = pickN(lessons, 3);

  function scoreLabel(n){
    if(n >= 85) return "Exceptional";
    if(n >= 70) return "Strong";
    if(n >= 55) return "Solid";
    if(n >= 40) return "Developing";
    return "At Risk";
  }

  const catRow = (name, val) => (
    '<div class="cat-score-row"><span class="cat-name">' + name + '</span><span class="cat-num">' + val + '/100</span></div>' +
    barHtml('cat-' + name.replace(/\s+/g,'') , val) +
    '<div style="height:14px;"></div>'
  );

  const aiCardsHtml = ai.chosen.map(a2 => (
    '<div class="card"><div class="opt-title" style="margin-bottom:6px;">' + esc(a2.title) + '</div><div class="opt-desc">' + esc(a2.impact) + '</div></div>'
  )).join('');

  return (
    '<div class="fade-in">' +
      '<div class="eyebrow">Final Results</div>' +
      '<h2 class="section-title">Crisis Debrief: ' + esc(company.name) + '</h2>' +
      '<p class="section-sub">Here\'s your full performance across leadership, negotiation, and operational resilience during the ' + crisis.title.toLowerCase() + '.</p>' +
      '<div class="card" style="margin-bottom:20px;">' +
        '<div class="gauge-wrap">' +
          '<div class="gauge-label">Overall Crisis Score</div>' +
          '<div class="gauge-score">' + overall + '<span style="font-size:26px;color:var(--muted);">/100</span></div>' +
          '<span class="pill gold">' + scoreLabel(overall) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="final-grid">' +
        '<div class="card">' +
          '<h3 style="font-size:18px;margin-bottom:16px;">Category Breakdown</h3>' +
          catRow('Leadership', leadership) +
          catRow('Negotiation', negotiationScore) +
          catRow('Resilience', resilience) +
          catRow('Cost Control', costControl) +
          catRow('Risk Management', riskMgmt) +
          catRow('Customer Satisfaction', customerSat) +
        '</div>' +
        '<div>' +
          '<div class="feedback-block"><h4>Biggest Mistake</h4><p>' + esc(biggestMistake) + '</p></div>' +
          '<div class="feedback-block"><h4>Best Decision</h4><p>' + esc(bestDecision) + '</p></div>' +
          '<div class="feedback-block"><h4>Expert Recommendation</h4><p>' + esc(expertRec) + '</p></div>' +
          '<div class="feedback-block"><h4>Lessons Learned</h4>' +
            pickedLessons.map((l,i) => '<p style="margin-bottom:' + (i < pickedLessons.length-1 ? '8px' : '0') + ';">• ' + esc(l) + '</p>').join('') +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="divider"></div>' +
      '<h3 style="font-size:18px;margin-bottom:14px;">Your AI Strategy Picks</h3>' +
      '<div class="grid grid-2">' + aiCardsHtml + '</div>' +
      '<div class="btn-row" style="justify-content:center;margin-top:36px;"><button class="btn primary" onclick="replayGame()">Run a New Simulation</button></div>' +
      '<div class="footer-note">OPERATION LIFELINE // SUPPLY CHAIN CRISIS LAB // ALL DATA GENERATED LOCALLY</div>' +
    '</div>'
  );
}

function replayGame(){
  state = {
    stage: "welcome",
    company: null,
    crisis: null,
    war: { selected: [], confirmed: false, metrics: null },
    neg: { roundIndex:0, trust:50, price:50, leadTime:50, showWhyOpt:null, result:null },
    board: { qIndex:0, totalScore:0, picked:null, answers:[], result:null },
    ai: { selected: [], result:null },
    final: null
  };
  render();
}

/* ============================= INIT ============================= */
render();
</script>
</body>
</html>
